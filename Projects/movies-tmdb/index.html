<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- https://getbootstrap.com/ -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

  <title>Movies</title>
<style>
body {
  background-color: rgba(209, 213, 219, 1);
}

#filter .form-switch input,
#filter .form-switch label {
  cursor: pointer;
}

#filterProviders {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: .45rem;
  align-items: stretch;
}
#filterProviders > .text-secondary {
  grid-column: 1 / -1;
}
#filterProviders .form-check {
  padding-left: 0;
  margin: 0;
  min-width: 0;
}
#filterProviders .form-check-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}
.filter-provider-label {
  width: 100%;
  min-height: 2rem;
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .25rem .5rem;
  border: 1px solid rgb(203, 213, 225);
  border-radius: 6px;
  background: rgba(255, 255, 255, .55);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .35);
  cursor: pointer;
  transition: background-color .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.filter-provider-label:hover {
  background: rgba(255, 255, 255, .85);
  border-color: rgb(148, 163, 184);
}
.filter-provider-label.provider-favorite {
  background: rgb(254, 243, 199);
  /* border-color: rgb(245, 158, 11); */
}
.filter-provider-label.provider-favorite:hover {
  background: rgb(253, 230, 138);
}
#filterProviders .form-check-input:checked + .filter-provider-label {
  background: rgb(255, 255, 255);
  border-color: rgb(37, 99, 235);
  box-shadow: 0 0 0 2px rgba(37, 99, 235, .16);
}
#filterProviders .form-check-input:checked + .filter-provider-label.provider-favorite {
  background: rgb(254, 243, 199);
  border-color: rgb(37, 99, 235);
}
.filter-provider-label .provider-name {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.provider-filter-icon {
  width: 2em;
  height: 2em;
  object-fit: contain;
  border-radius: .2rem;
  flex: 0 0 auto;
}
.provider-dot {
  width: .75rem;
  height: .75rem;
  border-radius: 50%;
  display: inline-block;
  margin-right: .4rem;
  vertical-align: -0.05rem;
}
.provider-free-ads-color {
  background-color: rgb(14, 165, 233);
}
.provider-flatrate-color {
  background-color: rgb(34, 197, 94);
}
.provider-rent-color {
  background-color: rgb(234, 179, 8);
}
.provider-buy-color {
  background-color: rgb(239, 68, 68);
}
.provider-none-color {
  background-color: rgb(107, 114, 128);
}

.movies-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  justify-content: space-between;

  /*display: flex;
  flex-wrap: wrap;
  flex-direction: row;
  justify-content: space-between;*/
}

.movie-card {
  width: 185px;
  background-color: rgba(243, 244, 246, 1);
  border-radius: .375rem;
  flex-direction: column;
  display: flex;
  margin-right: 1rem;
  margin-bottom: 1.5rem !important;
  overflow: hidden !important;
}
.movie-card > a > img {
  width: 12rem; /* @todo ???? */
  height: 278px !important;
  object-fit: cover;
}
.movie-card figcaption {
  padding: .5rem !important;
}
.movie-card p {
  margin: 0;
  word-wrap: break-word;
  word-break: break-word;
}
.movie-card .title {
  font-weight: 500;
}
.movie-card .providers [data-provider-id] {
  display: inline-block;
  margin: 0px 2px 0px 0px;
  padding: 2px;
  background-color: rgba(255, 255, 255, .8);
  border: 2px solid rgb(196, 208, 232);
  border-radius: 6px;
  line-height: 1;
  text-decoration: none;
}
.movie-card .providers [data-provider-id]:focus-visible {
  outline: 2px solid rgb(37, 99, 235);
  outline-offset: 2px;
}
.movie-card .providers img {
  width: 2em !important;
  height: 2em !important;
  object-fit: contain;
  display: block;
}
.movie-card .providers .provider-free-ads {
  border-color: rgb(14, 165, 233);
  box-shadow: 0 0 0 1px rgba(14, 165, 233, .18);
}
.movie-card .providers .provider-flatrate {
  border-color: rgb(34, 197, 94);
  box-shadow: 0 0 0 1px rgba(34, 197, 94, .18);
}
.movie-card .providers .provider-rent {
  border-color: rgb(234, 179, 8);
  box-shadow: 0 0 0 1px rgba(234, 179, 8, .18);
}
.movie-card .providers .provider-buy {
  border-color: rgb(239, 68, 68);
  box-shadow: 0 0 0 1px rgba(239, 68, 68, .18);
}
</style>
</head>
<body class="bg-gray-300 p-4">
  <template id="movie-card-template">
    <figure class="movie-card mb-4 mr-4" data-provider-free-ads="" data-provider-flatrate="" data-provider-rent="" data-provider-buy="">
      <a href="" target="_blank"><img src="" class="w-48 h-auto" loading="lazy" /></a>
      <figcaption class="p-2">
        <p class="title"></p>
        <p class="providers"></p>
      </figcaption>
    </figure>
  </template>
  <template id="template-filter-switch">
    <div class="form-check form-switch form-check-inline">
      <input class="form-check-input" type="checkbox" id="filterSwitch" name="filterSwitch">
      <label class="form-check-label" for="filterSwitch">Switch</label>
    </div>
  </template>

  <div id="filter" class="container-fluid">
    <div class="row">
      <div class="col-12 col-md-12 col-lg-3 col-xl-2">
        <div class="text-secondary">View</div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="showProviderFreeAds" name="showProviderFreeAds" checked>
          <label class="form-check-label" for="showProviderFreeAds"><span class="provider-dot provider-free-ads-color"></span>Free / Ads</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="showProviderFlatrate" name="showProviderFlatrate" checked>
          <label class="form-check-label" for="showProviderFlatrate"><span class="provider-dot provider-flatrate-color"></span>Subscription / Library</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="showProviderRent" name="showProviderRent" checked>
          <label class="form-check-label" for="showProviderRent"><span class="provider-dot provider-rent-color"></span>Rent</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="showProviderBuy" name="showProviderBuy" checked>
          <label class="form-check-label" for="showProviderBuy"><span class="provider-dot provider-buy-color"></span>Buy</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="showProviderNone" name="showProviderNone" checked>
          <label class="form-check-label" for="showProviderNone"><span class="provider-dot provider-none-color"></span>Unavailable</label>
        </div>
        <div class="text-secondary mt-3">Sort</div>
        <select id="sortMode" class="form-select form-select-sm">
          <option value="title">Alphabetical</option>
          <option value="year">By year</option>
        </select>
      </div>
      <div class="col">
        <div class="row">
          <div class="col" id="filterProviders">
            <div class="text-secondary">Providers</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <h2 class="d-flex align-items-baseline justify-content-between">
    <span>Movies</span>
    <span id="movieStats" class="fs-6 text-secondary"></span>
  </h2>
  <div id="movies" class="movies-container"></div>

  <h2 class="d-flex align-items-baseline justify-content-between">
    <span>TV</span>
    <span id="tvStats" class="fs-6 text-secondary"></span>
  </h2>
  <div id="tvs" class="movies-container"></div>

  <div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>Some text in the Modal..</p>
    </div>
  </div>

<script src="config.js"></script>
<script>
class Movies {
  initialize(moviesDirect, providersDirect, config = {}) {
    const instance = this;
    this.filterProvidersAvailable = {};
    this.providersData = {items: {}};
    this.providerGroups = [
      {key: 'freeAds', sources: ['free', 'ads'], label: 'Free / Ads', className: 'provider-free-ads'},
      {key: 'flatrate', sources: ['flatrate'], label: 'Subscription / Library', className: 'provider-flatrate'},
      {key: 'rent', sources: ['rent'], label: 'Rent', className: 'provider-rent'},
      {key: 'buy', sources: ['buy'], label: 'Buy', className: 'provider-buy'},
    ];
    const defaultProviderFavorites = [];
    const defaultProviderBlacklist = [];
    this.providerFavorites = (
      Array.isArray(config?.providerFavorites) ? config.providerFavorites : defaultProviderFavorites
    ).map(String);
    this.providerBlacklist = (
      Array.isArray(config?.providerBlacklist) ? config.providerBlacklist : defaultProviderBlacklist
    ).map(String);

    // For lazy movies.json include, not really recommended
    if (moviesDirect && (
      moviesDirect.movies && moviesDirect.movies.length > 0
      || moviesDirect.tvs && moviesDirect.tvs.length > 0
    )) {
      instance.providersData = providersDirect || {items: {}};
      instance.render(moviesDirect);
    } else {
      Promise.all([
        fetch('/movies.json', {cache: 'no-cache'}).then((response) => response.json()),
        fetch('/providers.json', {cache: 'no-cache'}).then((response) => response.json()).catch(() => ({items: {}})),
      ]).then(([moviesData, providersData]) => {
        instance.providersData = providersData || {items: {}};
        instance.render(moviesData);
      });
    }

    const filterInputs = document.querySelectorAll('#filter input');
    if (filterInputs.length > 0) {
      filterInputs.forEach(input => {
        input.addEventListener('change', (event) => {
          instance.search();
        });
      });
    }
    document.getElementById('sortMode').addEventListener('change', () => {
      instance.sortContainers();
    });
  }

  render(data) {
    this.parseMovies('movies', data.movies);
    this.parseMovies('tvs', data.tvs);
    this.sortContainers();
    this.addProviderFilter();
    this.addViewFilter();
    this.search();
  }

  toTitleCase(str) {
    return str.replace(/\w\S*/g, (text) => {
      return text.charAt(0).toUpperCase() + text.substr(1).toLowerCase();
    });
  }

  parseMovies(category, movies) {
    if (!movies) {
      return;
    }

    const movieType = category.substr(0, category.length - 1);
    const containerMovies = document.getElementById('movies');
    const containerTvs = document.getElementById('tvs');

    // Just be sure a title exists
    for (const movie of movies) {
      if (!movie.title) {
        movie.title = '';
      }
    }

    movies = movies.sort((a, b) => a.title.localeCompare(b.title));
    for (const movie of movies) {
      const tmpl = document.getElementById('movie-card-template').content.cloneNode(true);
      const year = parseInt(movie.year, 10);

      tmpl.children[0].dataset.type = movieType;
      tmpl.children[0].dataset.id = movie.id || 0;
      tmpl.children[0].dataset.title = movie.title.toLowerCase();
      tmpl.children[0].dataset.year = Number.isInteger(year) ? year : 0;
      tmpl.querySelector('.title').innerText = movie.title + (year > 0 ? ` (${year})` : '');
      tmpl.querySelector('a').href = movie.url || (movie.id ? `https://themoviedb.org/${movieType}/${movie.id}` : '');

      const image = tmpl.querySelector('img');
      image.onerror = () => {
        image.onerror = null;
        image.setAttribute('src', 'images/no-image.jpg');
      };
      image.setAttribute('src', `images/tmdb/${movieType}-${movie.id}.jpg`);

      this.addProvidersToCard(tmpl.children[0], tmpl.querySelector('.providers'), movie, movieType);

      if (movieType === 'movie') {
        containerMovies.appendChild(tmpl);
      } else if (movieType === 'tv') {
        containerTvs.appendChild(tmpl);
      }
    }
  }

  sortContainers() {
    this.sortContainer(document.getElementById('movies'));
    this.sortContainer(document.getElementById('tvs'));
  }

  sortContainer(container) {
    const sortMode = document.getElementById('sortMode').value;
    const cards = Array.from(container.querySelectorAll('.movie-card'));
    cards.sort((a, b) => {
      if (sortMode === 'year') {
        const yearCompare = (parseInt(a.dataset.year, 10) || 999999) - (parseInt(b.dataset.year, 10) || 999999);
        if (yearCompare !== 0) {
          return yearCompare;
        }
      }
      return a.dataset.title.localeCompare(b.dataset.title);
    });
    for (const card of cards) {
      container.appendChild(card);
    }
  }

  providerItemKey(movie, movieType) {
    return `${movieType}-${movie.id}`;
  }

  uniqueProviders(providers, sources) {
    const byId = {};
    for (const source of sources) {
      for (const provider of providers[source] || []) {
        if (provider && provider.id && !this.providerBlacklist.includes(String(provider.id))) {
          byId[provider.id] = {
            ...provider,
            id: String(provider.id),
          };
        }
      }
    }
    return Object.values(byId).sort((a, b) => {
      return (a.displayPriority || 9999) - (b.displayPriority || 9999) || a.name.localeCompare(b.name);
    });
  }

  addProvidersToCard(card, container, movie, movieType) {
    const providers = this.providersData.items[this.providerItemKey(movie, movieType)] || {};
    const region = this.providersData.region || 'DE';
    const watchUrl = providers.link || `https://www.themoviedb.org/${movieType}/${movie.id}/watch?locale=${encodeURIComponent(region)}`;

    for (const group of this.providerGroups) {
      const groupProviders = this.uniqueProviders(providers, group.sources);
      card.dataset[`provider${group.key.charAt(0).toUpperCase()}${group.key.slice(1)}`] = groupProviders.map(provider => provider.id).join(',');

      for (const provider of groupProviders) {
        this.filterProvidersAvailable[provider.id] = provider;
        const providerElement = document.createElement('a');
        providerElement.classList.add(group.className);
        providerElement.href = watchUrl;
        providerElement.target = '_blank';
        providerElement.rel = 'noopener noreferrer';
        providerElement.dataset.providerId = provider.id;
        providerElement.dataset.providerName = provider.name;
        providerElement.dataset.providerGroup = group.key;
        providerElement.dataset.providerLogoFile = provider.logoFile || '';
        providerElement.dataset.providerLogo = provider.logo || '';
        providerElement.title = `${provider.name} - ${group.label}: Streaming-Angebote öffnen`;
        providerElement.setAttribute('aria-label', `${provider.name}: Streaming-Angebote für ${movie.title} öffnen`);
        providerElement.appendChild(this.createProviderIcon(provider, 'provider-icon'));
        container.appendChild(providerElement);
      }
    }
  }

  providerLogoSrc(provider) {
    if (provider.logoFile) {
      return provider.logoFile;
    }
    if (provider.logo) {
      return `https://image.tmdb.org/t/p/original${provider.logo}`;
    }
    return '';
  }

  createProviderIcon(provider, className) {
    const icon = document.createElement('img');
    const logoSrc = this.providerLogoSrc(provider);
    icon.classList.add(className);
    icon.alt = provider.name;
    icon.title = provider.name;
    if (logoSrc) {
      icon.src = logoSrc;
    } else {
      icon.style.display = 'none';
    }
    return icon;
  }

  collectVisibleProviders() {
    const providers = {};
    const visibleGroups = this.visibleProviderGroups();
    const cards = document.querySelectorAll('.movie-card');

    for (const card of cards) {
      for (const providerElement of card.querySelectorAll('.providers [data-provider-id]')) {
        if (visibleGroups.includes(providerElement.dataset.providerGroup)) {
          providers[providerElement.dataset.providerId] = {
            id: providerElement.dataset.providerId,
            name: providerElement.dataset.providerName,
            logo: providerElement.dataset.providerLogo,
            logoFile: providerElement.dataset.providerLogoFile,
          };
        }
      }
    }

    return providers;
  }

  search() {
    const selectedProviders = [];
    for (const providerId of Object.keys(this.filterProvidersAvailable)) {
      if (document.getElementById(`filterProvider-${providerId}`).checked) {
        selectedProviders.push(providerId);
      }
    }
    const visibleGroups = this.visibleProviderGroups();
    const showNoProviders = document.getElementById('showProviderNone').checked;

    this.updateProviderBadges(selectedProviders, visibleGroups);
    const movieStats = this.filterMovies(document.querySelectorAll('#movies > *'), selectedProviders, visibleGroups, showNoProviders);
    const tvStats = this.filterMovies(document.querySelectorAll('#tvs > *'), selectedProviders, visibleGroups, showNoProviders);
    this.updateStats(movieStats, tvStats);
  }

  filterMovies(movies, selectedProviders, visibleGroups, showNoProviders) {
    let visibleCount = 0;
    if (movies.length > 0) {
      for (let i = 0; i < movies.length; i++) {
        let display = false;
        const movieProviderIds = this.movieProviderIdsForGroups(movies[i], visibleGroups);
        const hasAnyProvider = this.movieProviderIdsForGroups(movies[i], this.providerGroups.map(group => group.key)).length > 0;

        if (selectedProviders.length > 0) {
          display = selectedProviders.some(providerId => movieProviderIds.includes(providerId));
        } else if (movieProviderIds.length > 0) {
          display = true;
        } else {
          display = showNoProviders && !hasAnyProvider;
        }

        movies[i].style.display = display ? '' : 'none';
        if (display) {
          visibleCount++;
        }
      }
    }
    return {
      visible: visibleCount,
      total: movies.length,
    };
  }

  movieProviderIdsForGroups(movie, groups) {
    const providerIds = [];
    for (const group of groups) {
      const groupProviders = (movie.dataset[`provider${group.charAt(0).toUpperCase()}${group.slice(1)}`] || '').split(',');
      for (const providerId of groupProviders) {
        if (providerId !== '' && !providerIds.includes(providerId)) {
          providerIds.push(providerId);
        }
      }
    }
    return providerIds;
  }

  addProviderFilter() {
    const instance = this;
    const selectedProviders = new Set();
    document.querySelectorAll('#filterProviders input:checked').forEach(input => selectedProviders.add(input.value));
    this.filterProvidersAvailable = this.collectVisibleProviders();

    const filterProvidersAvailableSorted = Object.values(this.filterProvidersAvailable).sort((a, b) => {
      return a.name.localeCompare(b.name);
    });

    const filterProviders = document.getElementById('filterProviders');
    filterProviders.innerHTML = '<div class="text-secondary">Providers</div>';
    for (const provider of filterProvidersAvailableSorted) {
      const tmpl = document.getElementById('template-filter-switch').content.cloneNode(true);

      const input = tmpl.querySelector('input');
      const providerId = String(provider.id);
      input.id = `filterProvider-${providerId}`;
      input.name = `filterProvider-${providerId}`;
      input.value = providerId;
      input.checked = selectedProviders.has(providerId);

      const label = tmpl.querySelector('label');
      label.classList.add('filter-provider-label');
      if (this.providerFavorites.includes(providerId)) {
        label.classList.add('provider-favorite');
      }
      label.htmlFor = `filterProvider-${providerId}`;
      label.innerHTML = '';
      label.appendChild(this.createProviderIcon(provider, 'provider-filter-icon'));
      const providerName = document.createElement('span');
      providerName.classList.add('provider-name');
      providerName.innerText = provider.name;
      label.appendChild(providerName);
      label.title = provider.name;

      input.addEventListener('change', (event) => {
        instance.search();
      });
      filterProviders.appendChild(tmpl);
    }
  }

  addViewFilter() {
    const instance = this;

    const movies = document.querySelectorAll('#movies > *');
    const tvs = document.querySelectorAll('#tvs > *');

    const switches = document.querySelectorAll('#showProviderFreeAds, #showProviderFlatrate, #showProviderRent, #showProviderBuy, #showProviderNone');
    for (const showSwitch of switches) {
      showSwitch.addEventListener('change', (event) => {
        instance.updateMoviesView(movies);
        instance.updateMoviesView(tvs);
        instance.addProviderFilter();
        instance.search();
      });
    }

    instance.updateMoviesView(movies);
    instance.updateMoviesView(tvs);
  }

  visibleProviderGroups() {
    const visible = [];
    if (document.getElementById('showProviderFreeAds').checked) {
      visible.push('freeAds');
    }
    if (document.getElementById('showProviderFlatrate').checked) {
      visible.push('flatrate');
    }
    if (document.getElementById('showProviderRent').checked) {
      visible.push('rent');
    }
    if (document.getElementById('showProviderBuy').checked) {
      visible.push('buy');
    }
    return visible;
  }

  updateMoviesView(movies) {
    const visibleGroups = this.visibleProviderGroups();

    for (const movie of movies) {
      const providers = movie.querySelectorAll('.providers [data-provider-id]');
      for (const provider of providers) {
        provider.style.display = visibleGroups.includes(provider.dataset.providerGroup) ? 'inline-block' : 'none';
      }
    }
  }

  updateProviderBadges(selectedProviders, visibleGroups) {
    const hasProviderSelection = selectedProviders.length > 0;

    for (const provider of document.querySelectorAll('.providers [data-provider-id]')) {
      const groupVisible = visibleGroups.includes(provider.dataset.providerGroup);
      const providerSelected = selectedProviders.includes(provider.dataset.providerId);
      provider.style.display = groupVisible && (!hasProviderSelection || providerSelected) ? 'inline-block' : 'none';
    }
  }

  updateStats(movieStats, tvStats) {
    document.getElementById('movieStats').innerText = `Visible ${movieStats.visible} of ${movieStats.total}`;
    document.getElementById('tvStats').innerText = `Visible ${tvStats.visible} of ${tvStats.total}`;
  }
}

const movies = new Movies();

// Only if you want include movies.json
const moviesDirect = {movies: [], tvs: []};
const providersDirect = {items: {}};

movies.initialize(
  moviesDirect,
  providersDirect,
  typeof config === 'undefined' ? {} : config,
);
</script>
</body></html>
